name: Docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

# 重点 1：必须添加 packages: write 权限，否则无法推送到 GHCR
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # 重点 2：将镜像前缀改为 ghcr.io/你的GitHub用户名小写
          - image: ghcr.io/${{ github.repository_owner }}/grok2api
            context: .
          - image: ghcr.io/${{ github.repository_owner }}/statsig-signer
            context: statsig-signer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}

      # 重点 3：将登录目标改为 ghcr.io，并使用 GitHub 自动注入的变量
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
